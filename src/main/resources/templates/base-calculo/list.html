<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Base de Cálculo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="body-standard">

    <div class="container container-list">
        <a href="/" class="back-link">&larr; Voltar para o Exportador</a>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="header-flex">
            <div>
                <h1>Base de Cálculo</h1>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Gerencie os registros importados da planilha</p>
            </div>
            <a th:href="@{/base-calculo/new}" class="btn">+ Novo Registro</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="80">ID</th>
                    <th>Grupo</th>
                    <th>Atividade</th>
                    <th>Un. Med.</th>
                    <th>Qtd UST</th>
                    <th>Perfil</th>
                    <th>Valor</th>
                    <th width="150">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${registros}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.grupoAtividades}"></td>
                    <td th:text="${r.atividade}"></td>
                    <td th:text="${r.unidadeMedida}"></td>
                    <td th:text="${r.quantidadeBaseUst}"></td>
                    <td th:text="${r.perfil}"></td>
                    <td th:text="${r.valor}"></td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/base-calculo/{id}/edit(id=${r.id})}" class="btn btn-small">Editar</a>
                            <form th:action="@{/base-calculo/{id}/delete(id=${r.id})}" method="post" style="display: inline;">
                                <button type="submit" class="btn btn-small btn-danger" onclick="return confirm('Tem certeza que deseja excluir?')">Excluir</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(registros)}">
                    <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 30px;">
                        Nenhum registro encontrado.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
