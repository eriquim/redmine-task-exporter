<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Base de Cálculo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="body-centered">

    <div class="container container-form">
        <div class="header-centered">
            <h1 th:text="${baseCalculo.id != null ? 'Editar Registro' : 'Novo Registro'}">Registro</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Preencha os dados da base de cálculo</p>
        </div>

        <form th:action="@{/base-calculo}" th:object="${baseCalculo}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label for="grupoAtividades">Grupo de Atividades</label>
                <input type="text" id="grupoAtividades" th:field="*{grupoAtividades}" placeholder="Ex: Sustentação de Sistemas...">
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="atividade">Atividade</label>
                    <input type="text" id="atividade" th:field="*{atividade}" placeholder="Ex: Análise de Requisito">
                </div>

                <div class="form-group">
                    <label for="unidadeMedida">Unidade de medida</label>
                    <input type="text" id="unidadeMedida" th:field="*{unidadeMedida}" placeholder="Ex: Unidade">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="quantidadeBaseUst">Quantidade base UST</label>
                    <input type="number" step="0.01" id="quantidadeBaseUst" th:field="*{quantidadeBaseUst}" placeholder="Ex: 10.5">
                </div>

                <div class="form-group">
                    <label for="valor">Valor</label>
                    <input type="number" step="0.01" id="valor" th:field="*{valor}" placeholder="Ex: 150.00">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="perfil">Perfil</label>
                    <input type="text" id="perfil" th:field="*{perfil}" placeholder="Ex: Analista Sênior">
                </div>

                <div class="form-group">
                    <label for="atributo">Atributo</label>
                    <input type="text" id="atributo" th:field="*{atributo}" placeholder="Opcional">
                </div>
            </div>

            <div class="form-group">
                <label for="referenciaCalculo">Referência Cálculo</label>
                <input type="text" id="referenciaCalculo" th:field="*{referenciaCalculo}" placeholder="Ex: Referência X">
            </div>

            <div class="form-group">
                <label for="produtoFinal">Produto Final</label>
                <textarea id="produtoFinal" th:field="*{produtoFinal}" placeholder="Descrição detalhada do produto final..." style="min-height: 100px;"></textarea>
            </div>

            <div class="btn-group">
                <a th:href="@{/base-calculo}" class="btn-secondary">Cancelar</a>
                <button type="submit">Salvar Registro</button>
            </div>
        </form>
    </div>

</body>
</html>
