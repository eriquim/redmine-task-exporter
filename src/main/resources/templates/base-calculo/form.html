<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Base de Cálculo</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: all 0.2s ease;
            outline: none;
            font-family: inherit;
        }
        
        textarea {
            font-family: monospace;
            min-height: 250px;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button, .btn-secondary {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button {
            background-color: var(--primary);
            color: white;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }
        
        .help-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 th:text="${baseCalculo.id != null ? 'Editar Registro' : 'Novo Registro'}">Registro</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Preencha os dados em formato JSON</p>
        </div>

        <form th:action="@{/base-calculo}" th:object="${baseCalculo}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label for="dados">Dados (JSON)</label>
                <textarea id="dados" th:field="*{dados}" placeholder="{&#10;  &#34;coluna1&#34;: &#34;valor1&#34;,&#10;  &#34;coluna2&#34;: 123&#10;}"></textarea>
                <p class="help-text">Insira as colunas e valores no formato de objeto JSON válido.</p>
            </div>

            <div class="btn-group">
                <a th:href="@{/base-calculo}" class="btn-secondary">Cancelar</a>
                <button type="submit">Salvar Registro</button>
            </div>
        </form>
    </div>

</body>
</html>
