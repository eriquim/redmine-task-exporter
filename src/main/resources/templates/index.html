<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportação de Tarefas Redmine</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: all 0.2s ease;
            outline: none;
            cursor: pointer;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231e293b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 10px auto;
            padding-right: 32px;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        .row {
            display: flex;
            gap: 16px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .icon-download {
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>Exportador de Tarefas</h1>
            <p>Gere um arquivo CSV a partir das tarefas do Redmine</p>
        </div>

        <form action="/export" method="post">
            <div class="row">
                <div class="form-group">
                    <label for="projetoId">Projeto</label>
                    <select id="projetoId" name="projetoId">
                        <option value="">-- Todos os Projetos --</option>
                        <option th:each="p : ${projetos}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tipoId">Tipo (Tracker)</label>
                    <select id="tipoId" name="tipoId">
                        <option value="">-- Todos os Tipos --</option>
                        <option th:each="t : ${tipos}" th:value="${t.id}" th:text="${t.name}"></option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="dataInicio">Data Início</label>
                    <input type="date" id="dataInicio" name="dataInicio">
                </div>

                <div class="form-group">
                    <label for="dataFim">Data Fim</label>
                    <input type="date" id="dataFim" name="dataFim">
                </div>
            </div>

            <button type="submit">
                <span class="icon-download">⬇️</span>
                Exportar CSV
            </button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/base-calculo" style="color: var(--primary); text-decoration: none; font-weight: 600; font-size: 14px;">Gerenciar Base de Cálculo &rarr;</a>
        </div>
    </div>

</body>

</html>
